select option{background:#fff;color:#1A1208}

const EC={

  AT:{c:"#2E7A4A",bg:"#E8F5ED",b:"#90D0AA"},AA:{c:"#7A3A9C",bg:"#F3E8FB",b:"#C8A0E0"},

const PC={
  "Hero DGMS":"#C67C2E","Hero Flex gauge":"#B89420","Devagi TTS":"#2E6A9C","LGB GMS":"#2E7A4A","LGB MRT":"#7A3A9C",

  "Ather DOB":"#1E6A8C","Srimukha TGM":"#9C7A10","Bharat gear length":"#A04020","Bharat gear Groove":"#2E7A3A",

  "Done":       {bg:"#EEFAF2",tx:"#1E7A44",bd:"#90D4AA",dot:"#1E7A44"},
  "On Hold":    {bg:"#FFFBE0",tx:"#9C7A10",bd:"#E0D080",dot:"#C8A020"},
  "Cancelled":  {bg:"#FEF0EE",tx:"#B03030",bd:"#E8A090",dot:"#D06060"},
  "Not Assigned":{bg:"#F2EDE4",tx:"#B89A70",bd:"#DDD0BB",dot:"#C8B090"},
};
const PRIO_C={Low:"#9A7A50",Medium:"#2E6A9C",High:"#C67C2E",Critical:"#C0392B"};

// ── State ─────────────────────────────────────────────────────────────────────
let db,currentUser=null,isGuest=false;
let tasks={},projects=[...ALL_PROJECTS];
let currentMonday=getMonday(new Date());
let mainTab="planner",activeEngTab="All",viewMode="grid";
let fEng="All",fProj="All",fAct="All",fStat="All",fPri="All",fSearch="";
let dbView="projects",dbFiltProj="All",dbFiltEng="All",dbFiltStat="All";
let editTask=null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function getMonday(d){const c=new Date(d),day=c.getDay();c.setDate(c.getDate()-day+(day===0?-6:1));c.setHours(0,0,0,0);return c;}
function wkDates(){return DAYS.map((_,i)=>{const d=new Date(currentMonday);d.setDate(currentMonday.getDate()+i);return d;});}
function fD(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function fDK(d){return d.toISOString().slice(0,10);}
function fT(ts){return ts?new Date(ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"—";}
function allTasks(){return Object.entries(tasks).map(([k,t])=>({...t,key:k}));}
function today(){return new Date();}
function avatar(e,sz=24){const c=(EC[e]||{c:"#C67C2E"}).c;return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:${sz*0.36}px;color:#fff;font-weight:800;flex-shrink:0">${e}</div>`;}
function pill(s){const st=SS[s]||SS["Planned"];return`<span style="background:${st.bg};color:${st.tx};border:1px solid ${st.bd};border-radius:12px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap">${s}</span>`;}
function stackedBar(items,total,h=28){
  if(total===0)return`<div style="height:${h}px;background:#F2EDE4;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#C8B090;font-style:italic">No tasks</div>`;
  return`<div style="display:flex;border-radius:8px;overflow:hidden;height:${h}px;background:#F2EDE4">${items.filter(x=>x.v>0).map(x=>{const w=Math.round((x.v/total)*100);return`<div title="${x.s}: ${x.v} (${w}%)" style="width:${w}%;background:${x.c};display:flex;align-items:center;justify-content:center;font-size:${h>=28?10:8}px;color:#fff;font-weight:700;overflow:hidden;white-space:nowrap">${w>=8?x.v:""}</div>`;}).join("")}</div>`;
}

// ── Firebase ──────────────────────────────────────────────────────────────────
function initFirebase(){
  try{
    const app=initializeApp(firebaseConfig);db=getDatabase(app);
    onValue(ref(db,"tasks"),snap=>{tasks=snap.val()||{};if(currentUser)renderPage();flashSync();});
    onValue(ref(db,"projects"),snap=>{if(snap.val())projects=snap.val();if(currentUser)renderPage();});
  }catch(e){console.warn("Firebase not configured");showBanner("⚠ Firebase not configured. Add your config on line 21.","#FEF0EE","#C0392B");}
}
function flashSync(){const el=document.getElementById("syncDot");if(el){el.textContent="● Live";el.style.color="#1E7A44";}}

// ── CRUD ──────────────────────────────────────────────────────────────────────
async function saveTask(t){
  if(!db){alert("Firebase not connected");return;}
  const key=t.key||push(ref(db,"tasks")).key;
  const d={...t,key:undefined,updatedBy:currentUser,updatedAt:Date.now()};
  await set(ref(db,`tasks/${key}`),d);
  toast(`✓ Task ${t.key?"updated":"assigned"} by ${currentUser}`);closeModal();
}
async function deleteTaskFb(key){
  if(!db||!confirm("Delete this task?"))return;
  await remove(ref(db,`tasks/${key}`));toast("✓ Deleted");closeModal();
}
async function saveProjects(){if(db)await set(ref(db,"projects"),projects);}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(task,defEng,defProj){
  if(isGuest){toast("👁 View only");return;}
  editTask=task?{...task}:{eng:defEng||ENGINEERS[0],proj:defProj||projects[0],act:ACTS[0].name,day:0,hrs:ACTS[0].h||1,stat:"Planned",pri:"Medium",note:""};
  renderModal();document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}

function renderModal(){

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label class="lbl">ENGINEER</label>
        <select id="mEng" class="inp" style="color:${ec.c};font-weight:600" onchange="onEngChange(this.value)">

        </select></div>
      <div><label class="lbl">PROJECT</label>
        <select id="mProj" class="inp" style="color:${gpc(t.proj)};font-weight:600">
          ${projects.map(p=>`<option value="${p}" ${p===t.proj?"selected":""}>${p}</option>`).join("")}
        </select></div>
      <div style="grid-column:1/3"><label class="lbl">ACTIVITY <span style="color:#C8B090;font-weight:400">(auto-fills std hours)</span></label>
        <select id="mAct" class="inp" style="color:#C67C2E;font-weight:600" onchange="onActChange(this.value)">
          ${ACTS.map(a=>`<option value="${a.name}" ${a.name===t.act?"selected":""}>#${String(a.id).padStart(2,"0")} — ${a.name}${a.h?" ("+a.h+"h)":""}</option>`).join("")}
        </select></div>
      <div><label class="lbl">DAY</label>
        <select id="mDay" class="inp">
          ${wd.map((d,i)=>`<option value="${i}" ${i===t.day?"selected":""}>${DAYS[i]} ${fD(d)}</option>`).join("")}
        </select></div>
      <div><label class="lbl">HOURS <span id="stdHint" style="color:#C8B090;font-weight:400">${AM[t.act]?.h?"Std:"+AM[t.act].h+"h":""}</span></label>

      <div><label class="lbl">PRIORITY</label>

      <div><label class="lbl">STATUS</label>
        <select id="mStat" class="inp">${STATUSES.map(s=>`<option ${s===t.stat?"selected":""}>${s}</option>`).join("")}</select></div>
      <div style="grid-column:1/3"><label class="lbl">NOTE</label>
        <input type="text" id="mNote" class="inp" value="${t.note||""}" placeholder="Task note..."/></div>
    </div>
    ${AM[t.act]?`<div style="margin-top:10px;background:#F2EDE4;border:1px solid #DDD0BB;border-radius:8px;padding:10px 14px;display:flex;gap:16px;flex-wrap:wrap">
      <div><div style="font-size:9px;color:#C8B090">ACTIVITY #</div><div style="color:#C67C2E;font-weight:700;font-size:15px">#${AM[t.act].id}</div></div>
      <div><div style="font-size:9px;color:#C8B090">STD HRS</div><div style="color:#B89420;font-weight:700;font-size:15px">${AM[t.act].h??"—"}h</div></div>
      <div style="flex:1"><div style="font-size:9px;color:#C8B090">ACTIVITY</div><div style="color:#7A5C30;font-size:11px;line-height:1.4;margin-top:2px">${t.act}</div></div>
    </div>`:""}
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="submitTask()" style="flex:1;padding:12px;background:#C67C2E;border:none;color:#fff;font-weight:700;font-size:14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 3px 10px rgba(198,124,46,.3)">${isNew?"Assign Task":"Update Task"}</button>
      ${!isNew?`<button onclick="deleteTaskFb('${t.key}')" style="padding:12px 16px;background:#FEF0EE;border:1px solid #E8A090;color:#C0392B;font-size:14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600">Delete</button>`:""}
    </div>`;
}
window.onActChange=v=>{const a=AM[v];if(a?.h)document.getElementById("mHrs").value=a.h;const h=document.getElementById("stdHint");if(h)h.textContent=a?.h?"Std:"+a.h+"h":"";};
window.onEngChange=v=>{const s=document.getElementById("mEng");if(s)s.style.color=(EC[v]||EC.KTM).c;};
window.submitTask=()=>saveTask({
  eng:document.getElementById("mEng").value,proj:document.getElementById("mProj").value,
  act:document.getElementById("mAct").value,day:Number(document.getElementById("mDay").value),
  hrs:Number(document.getElementById("mHrs").value),pri:document.getElementById("mPri").value,
  stat:document.getElementById("mStat").value,note:document.getElementById("mNote").value,key:editTask.key||null,
});

              <div style="width:9px;height:9px;border-radius:50%;background:#B89420"></div>

          </div>

            <button class="tab-btn" onclick="switchMain('planner')" id="mainTabP" style="background:${mainTab==="planner"?"#C67C2E":"transparent"};color:${mainTab==="planner"?"#fff":"#9A7A50"}">📅 Weekly Planner</button>
            <button class="tab-btn" onclick="switchMain('dashboard')" id="mainTabD" style="background:${mainTab==="dashboard"?"#2E6A9C":"transparent"};color:${mainTab==="dashboard"?"#fff":"#9A7A50"}">📊 Project Dashboard</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="syncDot" style="color:#1E7A44;font-size:11px;font-weight:600">● Live</span>

          <button onclick="logout()" class="obtn" style="font-size:11px">Switch</button>

    <div id="pageContent" style="padding:14px 20px"></div>

      <div id="modalContent" style="background:#fff;border:1px solid #DDD0BB;border-radius:14px;width:100%;max-width:560px;padding:24px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)"></div>

  </div>`;

function renderPage(){if(!currentUser){renderLogin();return;}renderShell();if(mainTab==="planner")renderPlanner();else renderDashboard();}

window.setMode=m=>{
  document.getElementById("engSection").style.display=m==="eng"?"block":"none";
  document.getElementById("guestSection").style.display=m==="guest"?"block":"none";
  document.getElementById("tabEng").style.cssText=`flex:1;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid ${m==="eng"?"#C67C2E":"#DDD0BB"};background:${m==="eng"?"#FDF3E7":"#fff"};color:${m==="eng"?"#C67C2E":"#9A7A50"};font-family:'DM Sans',sans-serif`;
  document.getElementById("tabGuest").style.cssText=`flex:1;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid ${m==="guest"?"#2E6A9C":"#DDD0BB"};background:${m==="guest"?"#EEF4FF":"#fff"};color:${m==="guest"?"#2E6A9C":"#9A7A50"};font-family:'DM Sans',sans-serif`;
};
window.selEng=e=>{
  window._sel=e;
  ENGINEERS.forEach(eng=>{const b=document.getElementById(`eb-${eng}`);if(b){b.style.borderColor=eng===e?(EC[eng]||EC.KTM).c:"#DDD0BB";b.style.background=eng===e?(EC[eng]||EC.KTM).bg:"#fff";}});
  const lb=document.getElementById("loginBtn");lb.textContent=`Enter as ${e} →`;lb.style.background="#C67C2E";lb.style.cursor="pointer";
};
window.loginEng=()=>{if(!window._sel)return;currentUser=window._sel;isGuest=false;renderPage();};
window.loginGuest=()=>{currentUser=document.getElementById("guestName")?.value||"Guest";isGuest=true;renderPage();};

// ── Planner ───────────────────────────────────────────────────────────────────
function renderPlanner(){
  const wd=wkDates(),at=allTasks();

    if(fPri!=="All"&&t.pri!==fPri)return false;
    if(fSearch){const q=fSearch.toLowerCase();if(![t.eng,t.proj,t.act,t.note||"",t.stat].some(v=>v.toLowerCase().includes(q)))return false;}

    <button onclick="nextWeek()" class="obtn" style="color:#9A7A50">▶</button>

    .map(s=>`<div style="background:${s.bg};border:1px solid #DDD0BB;border-radius:9px;padding:10px 12px"><div style="font-size:21px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:10px;color:#9A7A50;margin-top:1px">${s.l}</div></div>`).join("")}
  </div>

        ${f.opts.map(o=>`<option value="${o}" ${o===f.cur?"selected":""}>${f.k==="fAct"&&o!=="All"?o.slice(0,20)+(o.length>20?"…":""):o}</option>`).join("")}

  </div>

  <div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px">

      return`<button onclick="setEngTab('${tab}')" style="background:${act?ec:"#fff"};border:1.5px solid ${act?ec:"#DDD0BB"};color:${act?"#fff":ec};padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:${act?700:500};white-space:nowrap;font-family:'DM Sans',sans-serif">${tab}${cnt>0?` <span style="opacity:.8;font-size:10px">(${cnt}·${hrs}h)</span>`:""}</button>`;

        return`<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <div style="display:flex;align-items:center;gap:6px">${avatar(e,20)}<span style="font-size:12px;color:#1A1208;font-weight:600">${e}</span></div>
            <span style="font-size:12px;font-weight:700;color:${col}">${h}h</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="background:${col};width:${Math.min(100,(h/10)*100)}%"></div></div>
        </div>`;}).join("")}
    </div>
    <div class="card">
      <div style="font-size:10px;color:#9A7A50;font-weight:700;letter-spacing:1px;margin-bottom:10px">PROJECTS (${projects.length})</div>
      ${!isGuest?`<div style="display:flex;gap:7px;margin-bottom:10px"><input type="text" id="newProjInp" placeholder="Add new project..." class="inp" style="flex:1"/><button onclick="addProj()" style="background:#C67C2E;border:none;color:#fff;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:16px;font-weight:700">+</button></div>`:""}

        ${!isGuest?`<button onclick="removeProj(${i})" style="background:none;border:none;color:#C8B090;cursor:pointer;font-size:14px;padding:0 4px">✕</button>`:""}
      </div>`).join("")}</div>
    </div>
  </div>`;
}

    <div style="display:grid;grid-template-columns:76px repeat(7,1fr);gap:4px;margin-bottom:4px">
      <div></div>
      ${wd.map((d,i)=>{const isT=fDK(d)===todayKey;return`<div style="background:${isT?"#FDF3E7":"#fff"};border:${isT?"1.5px solid #C67C2E":"1px solid #DDD0BB"};border-radius:7px;padding:7px 5px;text-align:center;${isT?"box-shadow:0 2px 8px rgba(198,124,46,.15)":""}">
        <div style="font-size:9px;color:${isT?"#C67C2E":"#C8B090"};font-weight:600;letter-spacing:1px">${DAYS[i]}</div>
        <div style="font-size:11px;font-weight:700;color:${isT?"#C67C2E":"#1A1208"};margin-top:1px">${fD(d)}</div>
      </div>`;}).join("")}
    </div>
    ${engs.map(eng=>{
      const ec=(EC[eng]||EC.KTM);
      const engH=ft.filter(t=>t.eng===eng).reduce((s,t)=>s+t.hrs,0);
      return`<div style="display:grid;grid-template-columns:76px repeat(7,1fr);gap:4px;margin-bottom:4px">
        <div style="background:${ec.bg};border:1.5px solid ${ec.b};border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px">

            style="background:${isT?"#FFFCF5":"#fff"};border:1px solid ${isT?"#E8C890":"#DDD0BB"};border-radius:7px;min-height:65px;padding:3px;cursor:${ct.length===0&&!isGuest?"pointer":"default"};position:relative"
            onmouseover="if(${ct.length}===0&&!${isGuest})this.style.borderColor='#C67C2E'" onmouseout="this.style.borderColor='${isT?"#E8C890":"#DDD0BB"}'"
          >
            ${ct.length===0&&!isGuest?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#DDD0BB;font-size:18px;opacity:.5">+</div>`:""}
            ${ct.map(t=>{
              const ss=SS[t.stat]||SS["Planned"];const pc=gpc(t.proj);const a=AM[t.act];
              return`<div onclick="event.stopPropagation();${!isGuest?`openModal(${JSON.stringify(t).replace(/"/g,"&quot;")})`:""}"
                style="background:${ss.bg};border:1px solid ${ss.bd};border-left:3px solid ${pc};border-radius:5px;padding:4px 6px;margin-bottom:3px;cursor:${isGuest?"default":"pointer"}"
                onmouseover="${!isGuest?"this.style.opacity='.75'":""}" onmouseout="this.style.opacity='1'"
              >
                ${a?`<div style="font-size:8px;color:#C8B090">#${a.id}</div>`:""}
                <div style="font-size:9px;color:${ss.tx};font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.act.length>20?t.act.slice(0,20)+"…":t.act}</div>
                <div style="font-size:8px;color:${pc};font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.proj.length>15?t.proj.slice(0,15)+"…":t.proj}</div>

}

        </div>`;}).join("")}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const at=allTasks();
  let ft=at;
  if(dbFiltEng!=="All")ft=ft.filter(t=>t.eng===dbFiltEng);
  if(dbFiltStat!=="All")ft=ft.filter(t=>t.stat===dbFiltStat);

  const totalH=at.reduce((s,t)=>s+t.hrs,0);
  const byS=s=>at.filter(t=>t.stat===s).length;

  const engLoad=ENGINEERS.map(e=>({
    e,h:at.filter(t=>t.eng===e).reduce((s,t)=>s+t.hrs,0),cnt:at.filter(t=>t.eng===e).length,
    done:at.filter(t=>t.eng===e&&t.stat==="Done").length,prog:at.filter(t=>t.eng===e&&t.stat==="In Progress").length,
    plan:at.filter(t=>t.eng===e&&t.stat==="Planned").length,hold:at.filter(t=>t.eng===e&&t.stat==="On Hold").length,
  }));
  const maxH=Math.max(...engLoad.map(x=>x.h),1);
  const least=[...engLoad].sort((a,b)=>a.h-b.h).slice(0,3);

  const projData=projects.map(p=>{
    const pt=at.filter(t=>t.proj===p);
    const done=pt.filter(t=>t.stat==="Done").length,prog=pt.filter(t=>t.stat==="In Progress").length;
    const plan=pt.filter(t=>t.stat==="Planned").length,hold=pt.filter(t=>t.stat==="On Hold").length;
    const canc=pt.filter(t=>t.stat==="Cancelled").length,total=pt.length;
    const hours=pt.reduce((s,t)=>s+t.hrs,0);
    const engs=[...new Set(pt.map(t=>t.eng))];
    const pct=total===0?0:Math.round((done/total)*100);
    return{p,pt,done,prog,plan,hold,canc,total,hours,engs,pct,col:gpc(p)};
  });
  const visPj=dbFiltProj==="All"?projData.filter(x=>x.total>0):projData.filter(x=>x.p===dbFiltProj);

  const actC={};ft.forEach(t=>{actC[t.act]=(actC[t.act]||0)+1;});
  const topActs=Object.entries(actC).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxA=topActs[0]?.[1]||1;

  const stacks=[{s:"Done",c:"#1E7A44"},{s:"In Progress",c:"#E8870A"},{s:"Planned",c:"#4A90D9"},{s:"On Hold",c:"#C8A020"},{s:"Cancelled",c:"#D06060"}];

  document.getElementById("pageContent").innerHTML=`
  <!-- Overall stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px">
    ${[{l:"Total Tasks",v:at.length,c:"#C67C2E",bg:"#FDF3E7"},{l:"Total Hours",v:totalH+"h",c:"#B89420",bg:"#FBF6E0"},{l:"Done",v:byS("Done"),c:"#1E7A44",bg:"#EEFAF2"},{l:"In Progress",v:byS("In Progress"),c:"#B86010",bg:"#FFF3E0"},{l:"Planned",v:byS("Planned"),c:"#2E5A9C",bg:"#EEF4FF"},{l:"On Hold",v:byS("On Hold"),c:"#9C7A10",bg:"#FFFBE0"},{l:"Projects",v:projects.length,c:"#7A3A9C",bg:"#F3E8FB"}]
    .map(s=>`<div style="background:${s.bg};border:1px solid #DDD0BB;border-radius:9px;padding:10px 12px"><div style="font-size:21px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:10px;color:#9A7A50;margin-top:1px">${s.l}</div></div>`).join("")}
  </div>

  <!-- Filter + View tabs -->
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select class="inp" style="width:auto;min-width:165px;font-size:11px;color:${dbFiltProj==="All"?"#9A7A50":gpc(dbFiltProj)};font-weight:${dbFiltProj==="All"?400:600}" onchange="dbFiltProj=this.value;renderDashboard()">
          <option value="All">All Projects</option>
          ${projects.map(p=>`<option value="${p}" ${p===dbFiltProj?"selected":""}>${p}</option>`).join("")}
        </select>
        <select class="inp" style="width:auto;min-width:130px;font-size:11px;color:${dbFiltEng==="All"?"#9A7A50":(EC[dbFiltEng]||EC.KTM).c};font-weight:${dbFiltEng==="All"?400:600}" onchange="dbFiltEng=this.value;renderDashboard()">
          <option value="All">All Engineers</option>
          ${ENGINEERS.map(e=>`<option value="${e}" ${e===dbFiltEng?"selected":""}>${e}</option>`).join("")}
        </select>
        <select class="inp" style="width:auto;min-width:130px;font-size:11px" onchange="dbFiltStat=this.value;renderDashboard()">
          <option value="All">All Statuses</option>
          ${STATUSES.map(s=>`<option value="${s}" ${s===dbFiltStat?"selected":""}>${s}</option>`).join("")}
        </select>
        ${dbFiltProj!=="All"||dbFiltEng!=="All"||dbFiltStat!=="All"?`<button onclick="dbFiltProj='All';dbFiltEng='All';dbFiltStat='All';renderDashboard()" style="background:#FEF0EE;border:1px solid #E8A090;color:#C0392B;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif">✕ Clear</button>`:""}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${[["projects","📋 Projects"],["workload","👷 Workload"],["activities","📊 Activities"]].map(([v,lbl])=>`<button onclick="dbView='${v}';renderDashboard()" style="padding:6px 12px;border-radius:7px;border:1px solid ${dbView===v?"#C67C2E":"#DDD0BB"};background:${dbView===v?"#FDF3E7":"#fff"};color:${dbView===v?"#C67C2E":"#9A7A50"};font-size:11px;font-weight:${dbView===v?700:500};cursor:pointer;font-family:'DM Sans',sans-serif">${lbl}</button>`).join("")}
        ${!isGuest?`<button onclick="openModal(null,null,null)" class="assign-btn">+ Assign Task</button>`:""}
      </div>
    </div>
  </div>

  ${dbView==="projects"?renderDbProjects(projData,visPj,stacks):""}
  ${dbView==="workload"?renderDbWorkload(engLoad,least,maxH,stacks):""}
  ${dbView==="activities"?renderDbActivities(topActs,maxA,ft):""}
  `;
}

// ── Dashboard: Projects ───────────────────────────────────────────────────────
function renderDbProjects(projData,visPj,stacks){
  // If a single project selected → show all 45 activities with status
  if(dbFiltProj!=="All"){
    const sel=projData.find(x=>x.p===dbFiltProj);
    if(!sel)return`<div class="card" style="text-align:center;color:#C8B090;padding:40px;font-style:italic">No data found.</div>`;
    const{p,pt,done,prog,plan,hold,canc,total,hours,engs,pct,col}=sel;

    const statMeta=[
      {s:"Done",c:"#1E7A44",bg:"#EEFAF2",bd:"#90D4AA",dot:"#1E7A44"},
      {s:"In Progress",c:"#B86010",bg:"#FFF3E0",bd:"#F0C880",dot:"#E8870A"},
      {s:"Planned",c:"#2E5A9C",bg:"#EEF4FF",bd:"#B0C8F0",dot:"#4A90D9"},
      {s:"On Hold",c:"#9C7A10",bg:"#FFFBE0",bd:"#E0D080",dot:"#C8A020"},
      {s:"Cancelled",c:"#B03030",bg:"#FEF0EE",bd:"#E8A090",dot:"#D06060"},
      {s:"Not Assigned",c:"#B89A70",bg:"#F2EDE4",bd:"#DDD0BB",dot:"#C8B090"},
    ];
    const sMap=Object.fromEntries(statMeta.map(x=>[x.s,x]));

    return`
    <!-- Project header -->
    <div class="card" style="margin-bottom:14px;border-left:5px solid ${col}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">
            <div style="width:14px;height:14px;border-radius:50%;background:${col}"></div>
            <span style="font-size:18px;font-weight:800;color:#1A1208">${p}</span>
            <span style="font-size:12px;color:#B89A70">${total} tasks · ${hours}h total</span>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${engs.map(e=>avatar(e,24)).join("")}${engs.length===0?`<span style="font-size:11px;color:#C8B090;font-style:italic">No engineers assigned</span>`:""}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${[{s:"Done",v:done,c:"#1E7A44"},{s:"In Progress",v:prog,c:"#E8870A"},{s:"Planned",v:plan,c:"#4A90D9"},{s:"On Hold",v:hold,c:"#C8A020"},{s:"Cancelled",v:canc,c:"#D06060"}]
            .map(x=>`<div style="display:flex;align-items:center;gap:5px;background:${x.c}14;border:1px solid ${x.c}40;border-radius:20px;padding:3px 10px"><div style="width:8px;height:8px;border-radius:50%;background:${x.c}"></div><span style="font-size:11px;color:${x.c};font-weight:700">${x.s}: ${x.v}</span></div>`).join("")}
          </div>
        </div>
        <div style="text-align:center">
          <div style="font-size:36px;font-weight:800;color:${pct>=75?"#1E7A44":pct>=40?"#B86010":"#C0392B"};line-height:1">${pct}%</div>
          <div style="font-size:11px;color:#B89A70;margin-top:4px">Completion</div>
          ${stackedBar([{s:"Done",v:done,c:"#1E7A44"},{s:"In Progress",v:prog,c:"#E8870A"},{s:"Planned",v:plan,c:"#4A90D9"},{s:"On Hold",v:hold,c:"#C8A020"},{s:"Cancelled",v:canc,c:"#D06060"}],total,10)}
        </div>
      </div>
    </div>

    <!-- Colour legend -->
    <div class="card" style="margin-bottom:12px;padding:10px 16px">
      <div style="font-size:10px;color:#9A7A50;font-weight:700;letter-spacing:1px;margin-bottom:8px">STATUS COLOUR LEGEND</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${statMeta.map(x=>`<div style="display:flex;align-items:center;gap:6px;background:${x.bg};border:1px solid ${x.bd};border-radius:8px;padding:5px 12px"><div style="width:10px;height:10px;border-radius:50%;background:${x.dot};flex-shrink:0"></div><span style="font-size:11px;color:${x.c};font-weight:700">${x.s}</span></div>`).join("")}
      </div>
    </div>

    <!-- All 45 activities table -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:12px;color:#9A7A50;font-weight:700;letter-spacing:1px">ALL 45 ACTIVITIES — ${p.toUpperCase()}</div>
        ${!isGuest?`<button onclick="openModal(null,null,'${p.replace(/'/g,"\\'")}')" class="assign-btn">+ Assign Activity</button>`:""}
      </div>
      <!-- Header -->
      <div style="display:grid;grid-template-columns:36px 34px 1fr 120px 56px 52px 108px 40px;gap:8px;padding:8px 12px;background:#F2EDE4;border-radius:6px 6px 0 0;border:1px solid #DDD0BB;border-bottom:none;font-size:9px;color:#9A7A50;font-weight:700;letter-spacing:1px">
        <span>#</span><span>ID</span><span>ACTIVITY NAME</span><span>ENGINEER</span><span>HRS</span><span>STD H</span><span>STATUS</span><span></span>
      </div>
      <div style="border:1px solid #DDD0BB;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
        ${ACTS.map((act,i)=>{
          const actTasks=pt.filter(t=>t.act===act.name);
          const hasT=actTasks.length>0;
          const t=actTasks[0];
          const stat=hasT?t.stat:"Not Assigned";
          const sm=sMap[stat]||sMap["Not Assigned"];
          return`<div class="act-row" style="display:grid;grid-template-columns:36px 34px 1fr 120px 56px 52px 108px 40px;gap:8px;padding:10px 12px;border-bottom:${i<ACTS.length-1?"1px solid #F2EDE4":"none"};background:${sm.bg};border-left:4px solid ${sm.dot}">
            <span style="font-size:10px;color:#C8B090;font-weight:600">${i+1}</span>
            <span style="font-size:10px;background:#F2EDE4;border-radius:4px;padding:1px 5px;color:#C67C2E;font-weight:700;text-align:center;height:fit-content">#${act.id}</span>
            <span style="font-size:12px;color:${hasT?"#1A1208":"#B89A70"};font-weight:${hasT?600:400};line-height:1.4">${act.name}</span>
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              ${hasT?actTasks.map(tt=>`<div style="display:flex;align-items:center;gap:4px">${avatar(tt.eng,20)}<span style="font-size:11px;color:${(EC[tt.eng]||EC.KTM).c};font-weight:700">${tt.eng}</span></div>`).join(""):`<span style="font-size:10px;color:#C8B090;font-style:italic">—</span>`}
            </div>
            <span style="font-size:12px;font-weight:700;color:${hasT?"#B89420":"#C8B090"}">${hasT?t.hrs+"h":"—"}</span>
            <span style="font-size:10px;color:#B89A70">${act.h?act.h+"h":"—"}</span>
            <span style="background:${sm.bg};color:${sm.c};border:1px solid ${sm.bd};border-radius:12px;padding:3px 8px;font-size:10px;font-weight:700;text-align:center;white-space:nowrap;opacity:${hasT?1:0.65}">${stat}</span>
            ${!isGuest?(hasT?`<button onclick="openModal(${JSON.stringify(t).replace(/"/g,"&quot;")})" style="background:#F2EDE4;border:1px solid #DDD0BB;color:#7A5C30;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:600;font-family:'DM Sans',sans-serif">Edit</button>`
              :`<button onclick="openModal({act:'${act.name.replace(/'/g,"\\'").replace(/"/g,"&quot;")}',hrs:${act.h||1}},null,'${p.replace(/'/g,"\\'")}')" style="background:${col};border:none;color:#fff;padding:3px 7px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif">+ Add</button>`):""}
          </div>`;}).join("")}
      </div>
    </div>`;
  }

  // All projects → summary cards
  return`<div class="card">
    <div style="font-size:12px;color:#9A7A50;font-weight:700;letter-spacing:1px;margin-bottom:4px">PROJECT WISE TASK STATUS — ${visPj.length} PROJECTS</div>
    <div style="font-size:11px;color:#C8B090;margin-bottom:16px">Select a project above to see all 45 activities with status</div>
    ${visPj.length===0?`<div style="text-align:center;color:#C8B090;padding:40px;font-style:italic">No projects with tasks. Click "+ Assign Task" to start.</div>`:""}
    ${visPj.map(({p,done,prog,plan,hold,canc,total,hours,engs,pct,col})=>`
    <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F2EDE4">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="width:12px;height:12px;border-radius:50%;background:${col};flex-shrink:0"></div>
          <span onclick="dbFiltProj='${p}';renderDashboard()" style="font-size:15px;font-weight:800;color:#1A1208;cursor:pointer;text-decoration:underline;text-decoration-color:${col}55">${p}</span>
          <span style="font-size:11px;color:#B89A70">${total} tasks · ${hours}h</span>
          <div style="display:flex;gap:3px">${engs.map(e=>avatar(e,20)).join("")}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px;font-weight:800;color:${pct>=75?"#1E7A44":pct>=40?"#B86010":"#C0392B"}">${pct}%</span>
          <button onclick="dbFiltProj='${p}';renderDashboard()" style="background:${col};border:none;color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif">View Activities</button>
          ${!isGuest?`<button onclick="openModal(null,null,'${p}')" style="background:none;border:1px solid ${col};color:${col};padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif">+ Assign</button>`:""}
        </div>
      </div>
      ${stackedBar(stacks.map(x=>({s:x.s,v:{Done:done,"In Progress":prog,Planned:plan,"On Hold":hold,Cancelled:canc}[x.s],c:x.c})),total)}
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        ${stacks.map(x=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${x.c}"></div><span style="font-size:11px;color:#9A7A50">${x.s}: <b style="color:${x.c}">${{Done:done,"In Progress":prog,Planned:plan,"On Hold":hold,Cancelled:canc}[x.s]}</b></span></div>`).join("")}
      </div>
    </div>`).join("")}
  </div>`;
}

// ── Dashboard: Workload ───────────────────────────────────────────────────────
function renderDbWorkload(engLoad,least,maxH,stacks){
  return`
  <div class="card" style="margin-bottom:14px;background:#FDF3E7;border:1px solid #E8C090">
    <div style="font-size:12px;color:#C67C2E;font-weight:700;letter-spacing:1px;margin-bottom:12px">💡 RECOMMENDED — LEAST LOADED ENGINEERS</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${least.map(({e,h,cnt},i)=>{const ec=(EC[e]||EC.KTM);return`<div style="background:${ec.bg};border:1px solid ${ec.c}40;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px">
        <span style="font-size:22px">${["🥇","🥈","🥉"][i]}</span>${avatar(e,36)}
        <div style="flex:1"><div style="font-size:15px;font-weight:800;color:${ec.c}">${e}</div><div style="font-size:11px;color:#9A7A50">${h}h assigned · ${cnt} tasks</div><div style="font-size:11px;color:#1E7A44;font-weight:600;margin-top:2px">✓ Available</div></div>
        ${!isGuest?`<button onclick="openModal(null,'${e}',null)" class="assign-btn">Assign</button>`:""}
      </div>`;}).join("")}
    </div>
  </div>
  <div class="card">
    <div style="font-size:12px;color:#9A7A50;font-weight:700;letter-spacing:1px;margin-bottom:16px">ENGINEER WORKLOAD — ALL ENGINEERS</div>
    ${engLoad.map(({e,h,cnt,done,prog,plan,hold})=>{
      const ec=(EC[e]||EC.KTM);const label=h>=8?"🔴 Heavy":h>=5?"🟡 Medium":"🟢 Light";
      const tot=done+prog+plan+hold;
      return`<div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F2EDE4">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px">${avatar(e,36)}
            <div><div style="font-size:15px;font-weight:800;color:${ec.c}">${e}</div><div style="font-size:11px;color:#9A7A50">${cnt} tasks · ${label}</div></div>
          </div>
          <div style="text-align:right"><div style="font-size:22px;font-weight:800;color:${h>=8?"#C0392B":h>=5?"#B89420":ec.c}">${h}h</div><div style="font-size:10px;color:#B89A70">total hours</div></div>
        </div>
        ${stackedBar([{s:"Done",v:done,c:"#1E7A44"},{s:"In Progress",v:prog,c:"#E8870A"},{s:"Planned",v:plan,c:"#4A90D9"},{s:"On Hold",v:hold,c:"#C8A020"}],tot,32)}
        <div class="prog-bar" style="margin-top:8px;height:8px"><div class="prog-fill" style="background:${h>=8?"#C0392B":h>=5?"#B89420":ec.c};width:${Math.round((h/maxH)*100)}%"></div></div>
        <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;align-items:center">
          ${[{s:"Done",v:done,c:"#1E7A44"},{s:"In Progress",v:prog,c:"#E8870A"},{s:"Planned",v:plan,c:"#4A90D9"},{s:"On Hold",v:hold,c:"#C8A020"}].map(x=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${x.c}"></div><span style="font-size:10px;color:#9A7A50">${x.s}: <b style="color:${x.c}">${x.v}</b></span></div>`).join("")}
          ${!isGuest?`<button onclick="openModal(null,'${e}',null)" class="assign-btn" style="margin-left:auto;font-size:10px;padding:4px 12px">+ Assign to ${e}</button>`:""}
        </div>
      </div>`;}).join("")}
  </div>`;
}

// ── Dashboard: Activities ─────────────────────────────────────────────────────
function renderDbActivities(topActs,maxA,ft){
  return`<div class="card">
    <div style="font-size:12px;color:#9A7A50;font-weight:700;letter-spacing:1px;margin-bottom:16px">ACTIVITY BREAKDOWN — TASK COUNT PER ACTIVITY</div>
    ${topActs.length===0?`<div style="text-align:center;color:#C8B090;padding:40px;font-style:italic">No tasks yet.</div>`:""}
    ${topActs.map(([name,cnt],i)=>{
      const a=AM[name];const w=Math.round((cnt/maxA)*100);
      const actTasks=ft.filter(t=>t.act===name);
      const engsForAct=[...new Set(actTasks.map(t=>t.eng))];
      return`<div style="margin-bottom:18px;padding-bottom:18px;border-bottom:${i<topActs.length-1?"1px solid #F2EDE4":"none"}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
            ${a?`<span style="background:#F2EDE4;border-radius:5px;padding:3px 8px;color:#C67C2E;font-size:11px;font-weight:700;flex-shrink:0">#${a.id}</span>`:""}
            <span style="font-size:13px;font-weight:700;color:#1A1208;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:10px">
            <div style="display:flex;gap:3px">${engsForAct.map(e=>avatar(e,20)).join("")}</div>
            <span style="font-size:16px;font-weight:800;color:#C67C2E">${cnt}</span>
            <span style="font-size:11px;color:#B89A70">task${cnt!==1?"s":""}</span>
            ${a?.h?`<span style="font-size:10px;color:#B89420;background:#FBF6E0;border:1px solid #DDD090;border-radius:5px;padding:2px 7px;font-weight:600">Std ${a.h}h</span>`:""}
          </div>
        </div>
        <div style="background:#F2EDE4;border-radius:6px;height:14px;overflow:hidden">
          <div style="background:linear-gradient(90deg,#C67C2E,#B89420);height:100%;border-radius:6px;width:${w}%;display:flex;align-items:center;justify-content:flex-end;padding-right:6px">
            ${w>=15?`<span style="font-size:10px;color:#fff;font-weight:700">${w}%</span>`:""}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
          ${STATUSES.map(s=>{const sv=actTasks.filter(t=>t.stat===s).length;if(!sv)return"";const st=SS[s]||SS["Planned"];return`<span style="background:${st.bg};color:${st.tx};border:1px solid ${st.bd};border-radius:12px;padding:1px 7px;font-size:9px;font-weight:700">${s}: ${sv}</span>`;}).join("")}
        </div>
      </div>`;}).join("")}
  </div>`;
}

// ── Global actions ─────────────────────────────────────────────────────────────
window.switchMain=t=>{mainTab=t;renderPage();};
window.prevWeek=()=>{const d=new Date(currentMonday);d.setDate(d.getDate()-7);currentMonday=d;renderPlanner();};
window.nextWeek=()=>{const d=new Date(currentMonday);d.setDate(d.getDate()+7);currentMonday=d;renderPlanner();};
window.goToday=()=>{currentMonday=getMonday(new Date());renderPlanner();};
window.toggleView=()=>{viewMode=viewMode==="grid"?"list":"grid";renderPlanner();};
window.setEngTab=t=>{activeEngTab=t;renderPlanner();};
window.logout=()=>{currentUser=null;isGuest=false;renderLogin();};
window.clearFilters=()=>{fEng="All";fProj="All";fAct="All";fStat="All";fPri="All";fSearch="";renderPlanner();};
window.openModal=openModal;window.closeModal=closeModal;window.deleteTaskFb=deleteTaskFb;
window.fEng="All";window.fProj="All";window.fAct="All";window.fStat="All";window.fPri="All";
window.addProj=async()=>{const v=document.getElementById("newProjInp")?.value?.trim();if(!v)return;projects=[...projects,v];await saveProjects();renderPlanner();toast("✓ Project added");};
window.removeProj=async i=>{projects=projects.filter((_,j)=>j!==i);await saveProjects();renderPlanner();toast("✓ Removed");};
function toast(msg){const el=document.getElementById("toast");if(!el)return;el.textContent=msg;el.style.opacity="1";el.style.transform="translateY(0)";setTimeout(()=>{el.style.opacity="0";el.style.transform="translateY(20px)";},3000);}
function showBanner(msg,bg,col){const b=document.getElementById("banner");if(!b)return;b.innerHTML=msg;b.style.display="block";b.style.background=bg;b.style.color=col;}

renderLogin();
initFirebase();
